<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seldon | External Brain</title>
    <meta name="description" content="External brain for your brain :) See your ideas, generate new ones, find connections, find themes." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="workspace">
        <section class="graph-panel">
          <div id="graph-canvas" class="graph-canvas">
            <svg id="graph-svg" aria-label="knowledge graph"></svg>
          </div>

          <div class="workspace-island">
            <select id="workspace-select"></select>
          </div>
          <div id="empty-state" class="empty-state hidden"></div>

          <!-- Floating note panel (top right) -->
          <div class="floating-panel">
            <div id="node-detail" class="node-detail hidden">
              <div class="detail-sheet">
                <div class="detail-section">
                  <h4>Note</h4>
                  <textarea id="detail-raw" class="detail-copy detail-edit"></textarea>
                </div>
                <div class="detail-section">
                  <h4 id="detail-tags-heading">Tags</h4>
                  <div id="detail-tags" class="tag-list"></div>
                  <div id="detail-tag-add" class="tag-add hidden">
                    <input id="detail-tag-input" type="text" placeholder="+ add tag" />
                  </div>
                </div>
                <button id="detail-save-button" type="button" class="detail-save hidden">Save</button>
                <div id="detail-narrative-section" class="detail-section hidden">
                  <h4>Narrative</h4>
                  <div id="detail-narrative" class="detail-narrative"></div>
                </div>
              </div>
            </div>
            <div id="add-node-sheet" class="detail-sheet create-node-sheet hidden">
              <div class="detail-section create-node-section">
                <h4 id="create-node-heading">Add Note</h4>
                <form id="create-node-form" class="create-node-form">
                  <textarea id="create-node-text" rows="4" placeholder="Write note text here. Add tags as #tag."></textarea>
                  <div id="create-node-time-wrap" class="hidden">
                    <label for="create-node-time">Time</label>
                    <input id="create-node-time" type="text" placeholder="2017 or 2017-06-12 or June 2017" />
                  </div>
                  <button id="create-node-submit" type="submit">Add Note</button>
                </form>
              </div>
            </div>
            <div id="edge-form-sheet" class="detail-sheet create-node-sheet hidden">
              <div class="detail-section create-node-section">
                <h4>Create Edge</h4>
                <div id="edge-selection-summary" class="edge-selection-summary">Select two nodes.</div>
                <form id="create-edge-form" class="create-node-form">
                  <label for="create-edge-type">Edge Note</label>
                  <input id="create-edge-type" type="text" value="related-somehow" placeholder="describe the relationship…" maxlength="300" />
                  <label for="create-edge-weight">Weight</label>
                  <input id="create-edge-weight" type="number" min="0" max="1" step="0.05" value="0.5" />
                  <button id="create-edge-submit" type="submit">Save Edge</button>
                </form>
              </div>
            </div>
          </div>

          <!-- Floating action bar (bottom center) -->
          <div class="floating-action-bar">
            <button class="fab-text-btn" id="toggle-add-node-button" type="button">+ Add Note</button>
            <span class="fab-divider"></span>
            <button class="fab-btn" id="poll-telegram-button" data-label="Poll Telegram" type="button">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
            <button class="fab-btn hidden" id="narrative-mode-button" data-label="Generate Narrative" type="button" aria-pressed="false">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
              </svg>
            </button>
            <button class="fab-btn" id="path-tracing-button" data-label="Path Tracing" type="button" aria-pressed="false">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="2.5"/>
                <circle cx="4" cy="6" r="2"/>
                <circle cx="20" cy="6" r="2"/>
                <circle cx="4" cy="18" r="2"/>
                <circle cx="20" cy="18" r="2"/>
                <line x1="6" y1="7" x2="10" y2="11"/>
                <line x1="18" y1="7" x2="14" y2="11"/>
                <line x1="6" y1="17" x2="10" y2="13"/>
                <line x1="18" y1="17" x2="14" y2="13"/>
              </svg>
            </button>
            <button class="fab-btn" id="generate-edges-button" data-label="Generate Edges" type="button">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
              </svg>
            </button>
            <button class="fab-btn" id="review-links-button" data-label="Review Links" type="button">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.5 2C7.6 2 6 3.6 6 5.5c0 .5.1 1 .3 1.4C4.9 7.7 4 9.2 4 11c0 1.4.6 2.7 1.5 3.6 0 .1-.1.3-.1.4 0 2.2 1.8 4 4 4H12"/>
                <path d="M14.5 2c1.9 0 3.5 1.6 3.5 3.5 0 .5-.1 1-.3 1.4C19.1 7.7 20 9.2 20 11c0 1.4-.6 2.7-1.5 3.6 0 .1.1.3.1.4 0 2.2-1.8 4-4 4H12"/>
                <line x1="12" y1="8" x2="12" y2="19"/>
              </svg>
            </button>
          </div>
        </section>
      </main>
    </div>

    <!-- Meta bar: fixed bottom right -->
    <div class="meta-bar">
      <a class="action-link" href="/advanced">Advanced</a>
      <button id="theme-toggle-button" type="button">Dark</button>
      <button id="developer-mode-button" type="button" aria-pressed="false">Developer Mode Off</button>
      <span id="developer-mode-status" class="action-status">showing user tags</span>
    </div>


    <div id="proposal-overlay" class="proposal-overlay hidden">
      <div class="proposal-drawer">
        <div class="proposal-header">
          <button id="close-proposals-button" type="button">Close</button>
        </div>
        <div id="proposal-list" class="proposal-list"></div>
      </div>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
